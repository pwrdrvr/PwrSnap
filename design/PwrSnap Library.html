<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PwrSnap — Library, Tray & App Tags</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="ds/colors_and_type.css" />
<link rel="stylesheet" href="src/floatover.css" />
<link rel="stylesheet" href="src/library.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  body { margin: 0; background: var(--bg-app); color: var(--text-primary); font-family: var(--font-sans); overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="src/design-canvas.jsx"></script>
<script type="text/babel" src="src/AppIcons.jsx"></script>
<script type="text/babel" src="src/TrayMenu.jsx"></script>
<script type="text/babel" src="src/Library.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const { DesignCanvas, DCSection, DCArtboard } = window;
const { TrayMenu, TrayMenubar, Library, PsAppTag, PsAppIcon, APP_INFO } = window.PS;

// ============================================================
// Notes panel
// ============================================================
function NotesPanel({ children, title }) {
  return (
    <div style={{
      width: "100%", height: "100%",
      padding: 36,
      background: "var(--bg-app)",
      borderRadius: 12,
      border: "1px solid var(--border-subtle)",
      fontFamily: "var(--font-sans)",
      color: "var(--text-secondary)",
      overflow: "auto",
    }}>
      <h2 style={{ font: "700 22px/1.15 var(--font-display)", color: "var(--text-primary)", margin: "0 0 6px", letterSpacing: "-0.01em" }}>{title}</h2>
      {children}
    </div>
  );
}

// ============================================================
// Tray host frame — desktop with menubar + tray dropping from PwrSnap icon
// ============================================================
function TrayHost({ activeMode = "region" }) {
  return (
    <div style={{
      position: "relative", width: "100%", height: "100%",
      background: "linear-gradient(140deg, #0a0908 0%, #14110d 50%, #050403 100%)",
      borderRadius: 12, overflow: "hidden",
      border: "1px solid var(--border-default)",
    }}>
      <TrayMenubar />
      {/* dotted line from menubar PwrSnap icon to tray */}
      <svg style={{ position: "absolute", top: 26, right: 88, width: 60, height: 14, pointerEvents: "none" }}>
        <line x1="0" y1="0" x2="0" y2="10" stroke="var(--accent)" strokeWidth="1" strokeDasharray="2 2" opacity="0.5" />
      </svg>
      <TrayMenu activeMode={activeMode} />
      {/* Faux desktop content under it */}
      <div style={{
        position: "absolute", left: 24, right: 24, top: 64, bottom: 24,
        display: "grid", gridTemplateColumns: "repeat(8, 1fr)", gap: 24,
        opacity: 0.32,
      }}>
        {Array.from({length: 16}).map((_, i) => (
          <div key={i} style={{
            aspectRatio: "1",
            background: "rgba(255,255,255,0.03)",
            border: "1px solid rgba(255,255,255,0.04)",
            borderRadius: 8,
          }} />
        ))}
      </div>
    </div>
  );
}

// ============================================================
// App-tag showcase — comparison + matrix
// ============================================================
function TagShowcase() {
  const apps = Object.entries(APP_INFO);
  return (
    <div style={{
      width: "100%", height: "100%", padding: 36,
      background: "var(--bg-app)",
      border: "1px solid var(--border-subtle)",
      borderRadius: 12,
      overflow: "auto",
      fontFamily: "var(--font-sans)",
    }}>
      <h2 style={{ font: "700 22px/1.15 var(--font-display)", color: "var(--text-primary)", margin: "0 0 6px", letterSpacing: "-0.01em" }}>App-source tags</h2>
      <p style={{ font: "400 13px/1.45 var(--font-sans)", color: "var(--text-secondary)", margin: "0 0 24px", maxWidth: 560 }}>
        A <b style={{color:"var(--text-primary)"}}>system tag</b> distinct from regular content tags.
        Auto-detected at capture time, immutable. Visual signal: square icon-tile on the left, mono name, no leading-dot, slight squarer corner radius. App icons are monochrome, tinted in the system accent — never a foreign brand color in the UI.
      </p>

      {/* Side-by-side */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, marginBottom: 32 }}>
        <div style={{ padding: 18, background: "var(--bg-panel)", borderRadius: 10, border: "1px solid var(--border-subtle)" }}>
          <div style={{ font: "600 9px/1 var(--font-sans)", letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: 12 }}>Regular tags</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            <span className="ps-tag">bug</span>
            <span className="ps-tag is-accent">auth</span>
            <span className="ps-tag is-info">research</span>
            <span className="ps-tag is-success">done</span>
            <span className="ps-tag is-warn">p1</span>
            <span className="ps-tag is-suggest">+ codex</span>
          </div>
          <div style={{ font: "500 10px/1.4 var(--font-mono)", color: "var(--text-muted)", marginTop: 12 }}>
            User-editable · pill · leading dot · removable
          </div>
        </div>
        <div style={{ padding: 18, background: "var(--bg-panel)", borderRadius: 10, border: "1px solid var(--accent-border)" }}>
          <div style={{ font: "600 9px/1 var(--font-sans)", letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--accent-bright)", marginBottom: 12 }}>App-source tag</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            <PsAppTag app="telegram" name="Telegram" />
            <PsAppTag app="excel" name="Excel" />
            <PsAppTag app="vscode" name="VS Code" />
            <PsAppTag app="figma" name="Figma" />
            <PsAppTag app="terminal" name="Terminal" />
          </div>
          <div style={{ font: "500 10px/1.4 var(--font-mono)", color: "var(--text-muted)", marginTop: 12 }}>
            System · square tile + name · immutable · always one per snap
          </div>
        </div>
      </div>

      {/* Sizes */}
      <div style={{ font: "600 9px/1 var(--font-sans)", letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: 10 }}>Sizes</div>
      <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 28 }}>
        <PsAppTag app="figma" name="Figma" size="sm" />
        <PsAppTag app="figma" name="Figma" size="md" />
        <PsAppTag app="figma" name="Figma" size="lg" />
        <span style={{ font: "500 10px/1.4 var(--font-mono)", color: "var(--text-muted)", marginLeft: 12 }}>sm 18 · md 22 · lg 26</span>
      </div>

      {/* Full grid */}
      <div style={{ font: "600 9px/1 var(--font-sans)", letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: 10 }}>Detected apps · {apps.length}</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
        {apps.map(([app, info]) => (
          <PsAppTag key={app} app={app} name={info.name} />
        ))}
      </div>

      {/* In context */}
      <div style={{ font: "600 9px/1 var(--font-sans)", letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--text-muted)", margin: "28px 0 10px" }}>In context · capture metadata row</div>
      <div style={{ padding: 14, background: "var(--bg-panel)", borderRadius: 8, border: "1px solid var(--border-subtle)" }}>
        <div style={{ font: "600 13px/1.3 var(--font-sans)", marginBottom: 8 }}>auth flow — token refresh</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 5, alignItems: "center" }}>
          <PsAppTag app="vscode" name="VS Code" />
          <span className="ps-tag">bug</span>
          <span className="ps-tag is-accent">auth</span>
          <span className="ps-tag is-warn">p1</span>
          <span className="ps-tag is-suggest">+ token-refresh</span>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// Tray notes
// ============================================================
function TrayNotes() {
  return (
    <NotesPanel title="Tray menu">
      <p style={{ font: "400 13px/1.5 var(--font-sans)", color: "var(--text-secondary)", margin: "0 0 14px" }}>
        Drops from the menubar PwrSnap icon. The app is keyboard-driven first — the tray exists for <b style={{color:"var(--text-primary)"}}>mode discovery</b> and <b style={{color:"var(--text-primary)"}}>library access</b>, not as the primary capture surface.
      </p>
      <ul style={{ font: "400 13px/1.6 var(--font-sans)", color: "var(--text-secondary)", paddingLeft: 18, margin: "0 0 14px" }}>
        <li>Six capture modes — Region (primary), Window, Full Screen, All Screens, Scrolling, Timed.</li>
        <li>Every row shows its hotkey. <b style={{color:"var(--text-primary)"}}>⌘⇧P</b> is the global "smart" trigger that fires the active mode.</li>
        <li>Last-snap card lets you re-copy / reopen instantly — covers the "I already took it, where did it go" case.</li>
        <li>Status pill (top-right) shows storage target and idle/recording state.</li>
        <li>Library, Search, Preferences sit below as global app actions.</li>
      </ul>
      <p style={{ font: "400 12px/1.5 var(--font-mono)", color: "var(--text-muted)", margin: 0 }}>
        Width: 380px. Anchors to the menubar icon. Closes on Esc, click-outside, or shortcut-fire.
      </p>
    </NotesPanel>
  );
}

function LibraryNotes() {
  return (
    <NotesPanel title="Library — three-pane">
      <p style={{ font: "400 13px/1.5 var(--font-sans)", color: "var(--text-secondary)", margin: "0 0 14px" }}>
        Left rail filters by source app (with counts), middle pane is the <b style={{color:"var(--text-primary)"}}>scrubbable horizontal reel</b> on top + day-grouped grid below, right pane is the detail editor with inline toolbar + AI strip + handoff to full editor.
      </p>
      <ul style={{ font: "400 13px/1.6 var(--font-sans)", color: "var(--text-secondary)", paddingLeft: 18, margin: "0 0 14px" }}>
        <li><b style={{color:"var(--text-primary)"}}>The reel</b> is the novel bit — film-strip metaphor, day-grouped, with a scrubbable playhead. ⌘[ / ⌘] to step. Hover lifts a frame; click selects.</li>
        <li><b style={{color:"var(--text-primary)"}}>Inline toolbar</b> floats over the preview: crop, arrow, box, text, blur, magic-wand (Codex annotate), undo. Quick edits without leaving.</li>
        <li><b style={{color:"var(--text-primary)"}}>Codex caption card</b> auto-runs at capture. Editable, rerunnable, applies suggested tags.</li>
        <li><b style={{color:"var(--text-primary)"}}>Sizzle reel mode</b> turns the strip into a drag-to-arrange sequence. Picked frames get a numbered badge + green border.</li>
        <li>"Editor" CTA opens the dedicated stage for advanced edits.</li>
      </ul>
      <p style={{ font: "400 12px/1.5 var(--font-mono)", color: "var(--text-muted)", margin: 0 }}>
        Window is sized for Mac users — 1440×900 minimum. Three columns: 220 / flex / 360.
      </p>
    </NotesPanel>
  );
}

// ============================================================
// Main
// ============================================================
function App() {
  return (
    <DesignCanvas projectName="PwrSnap" deliverable="Library · Tray · App tags">

      <DCSection id="tray" title="① Tray menu">
        <DCArtboard id="tray-host" label="Tray dropdown · from menubar" width={920} height={620}>
          <TrayHost activeMode="region" />
        </DCArtboard>
        <DCArtboard id="tray-notes" label="Notes" width={460} height={620}>
          <TrayNotes />
        </DCArtboard>
      </DCSection>

      <DCSection id="apptag" title="② App-source tag · system provenance">
        <DCArtboard id="apptag-showcase" label="Anatomy · sizes · matrix" width={920} height={760}>
          <TagShowcase />
        </DCArtboard>
      </DCSection>

      <DCSection id="library" title="③ Library · three-pane (source · reel · editor)">
        <DCArtboard id="library-default" label="Default · all captures · reel view" width={1440} height={900}>
          <Library initialSelected={5} />
        </DCArtboard>
      </DCSection>

      <DCSection id="library-states" title="④ Library states">
        <DCArtboard id="library-vscode" label="Filtered to VS Code" width={1440} height={900}>
          <Library initialSelected={5} />
        </DCArtboard>
        <DCArtboard id="library-sizzle" label="Sizzle reel composer · 5 picks" width={1440} height={900}>
          <Library initialSelected={9} sizzleMode={true} sizzlePicks={[5, 9, 11, 17, 19]} />
        </DCArtboard>
        <DCArtboard id="library-notes" label="Notes" width={520} height={900}>
          <LibraryNotes />
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
