appId: com.pwrdrvr.pwrsnap
productName: PwrSnap
copyright: "Copyright © 2026 PwrDrvr LLC. All rights reserved."

electronVersion: 41.2.1

asar: true
asarUnpack:
  - "**/*.node"
  # Fast Video Capture (issue #64) needs the ffmpeg binary unpacked
  # from asar. `@ffmpeg-installer/<platform>` ships a static ffmpeg
  # executable; `child_process.spawn` on a path inside an asar
  # archive fails (the OS can't exec a virtual filesystem entry),
  # so every GIF / MP4 export would 100% fail in a packaged build
  # without this. The wrapper package's resolver
  # (apps/desktop/src/main/recording/ffmpeg-resolver.ts) reads
  # `require("@ffmpeg-installer/ffmpeg").path` which points to the
  # unpacked binary under `app.asar.unpacked/...`.
  - "**/node_modules/@ffmpeg-installer/**"
compression: normal

# Files included in the .app bundle. Run via apps/desktop/scripts/release.mjs
# which first runs `pnpm deploy` to materialize a flat node_modules tree, since
# pnpm's symlinked virtual store interacts poorly with electron-builder's
# default node_modules walk.
files:
  - "out/**/*"
  - "package.json"
  # Compiled JS only — drop sources, declarations, and sourcemaps.
  - "!**/*.map"
  - "!**/*.ts"
  - "!**/*.tsx"
  - "!**/*.d.ts"
  - "!**/tsconfig*.json"
  # Tests of any flavor.
  - "!**/*.test.*"
  - "!**/*.spec.*"
  - "!**/__tests__/**"
  - "!**/__mocks__/**"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/e2e/**"
  - "!**/playwright.config.*"
  # Markdown / docs from third-party packages and our own workspace packages.
  # The app-owned prompt exception above is intentional.
  - "!**/*.md"
  - "!**/*.mdx"
  - "!**/docs/**"
  # Misc dotfiles and examples that occasionally ship inside dependency tarballs.
  - "!**/.env*"
  - "!**/.npmignore"
  - "!**/.editorconfig"
  - "!**/.eslintrc*"
  - "!**/.prettierrc*"
  - "!**/.github/**"
  # Our own workspace package metadata is unused at runtime — vite inlines.
  - "!**/node_modules/@pwrsnap/*/AGENTS.md"
  - "!**/node_modules/@pwrsnap/*/src/**"
  # App-owned prompt assets are intentionally readable Markdown in app.asar.
  - "out/main/prompts/**/*.md"

# Native helpers (Swift CLIs that wrap macOS-only system APIs).
# Compiled by `apps/desktop/scripts/build-native.mjs` into
# `apps/desktop/build/native/`; ship them under Contents/Resources/
# with PwrSnap-prefixed names so `process.resourcesPath` lookups in
# main are unambiguous.
extraResources:
  - from: "THIRD_PARTY_LICENSES"
    to: "THIRD_PARTY_LICENSES"
  - from: "CHANGELOG.md"
    to: "CHANGELOG.md"
  - from: "build/native/window-list"
    to: "PwrSnapWindowList"
  # Fast Video Capture helper (issue #64). ScreenCaptureKit-based
  # fixed-rect recorder spoken to via stdin/stdout JSON-RPC by
  # apps/desktop/src/main/recording/recording-service.ts.
  - from: "build/native/recorder"
    to: "PwrSnapRecorder"
  # Tray template icon (16×16 base + @2x/@3x). Electron's nativeImage
  # auto-loads the @Nx siblings when given the base path, so all three
  # PNGs need to live next to each other under Contents/Resources/.
  # Resolved at runtime by resolveTrayIconPath() in main/tray.ts.
  - from: "build/tray-icon-template.png"
    to: "tray-icon-template.png"
  - from: "build/tray-icon-template@2x.png"
    to: "tray-icon-template@2x.png"
  - from: "build/tray-icon-template@3x.png"
    to: "tray-icon-template@3x.png"

electronFuses:
  runAsNode: false
  enableCookieEncryption: true
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true
  loadBrowserProcessSpecificV8Snapshot: false
  grantFileProtocolExtraPrivileges: true

mac:
  category: public.app-category.graphics-design
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # These files are intentionally identical in both temp app trees before
  # @electron/universal merges them. The Swift helper is prebuilt universal;
  # Sharp and ffmpeg optional dependency directories are arch-named and each
  # final app needs both Darwin CPU payloads available at runtime.
  x64ArchFiles: "Contents/Resources/{PwrSnapWindowList,app.asar.unpacked/node_modules/{@img/{sharp-darwin-*,sharp-libvips-darwin-*},@ffmpeg-installer/darwin-*}/**/*}"
  helperBundleId: com.pwrdrvr.pwrsnap.helper
  helperRendererBundleId: com.pwrdrvr.pwrsnap.helper.Renderer
  helperGPUBundleId: com.pwrdrvr.pwrsnap.helper.GPU
  helperPluginBundleId: com.pwrdrvr.pwrsnap.helper.Plugin
  extendInfo:
    NSHumanReadableCopyright: "Copyright © 2026 PwrDrvr LLC. All rights reserved."
    LSMinimumSystemVersion: "14.0"
    LSApplicationCategoryType: public.app-category.graphics-design
    NSScreenCaptureUsageDescription: "PwrSnap captures your screen for screenshots and screen recording."
    NSMicrophoneUsageDescription: "PwrSnap uses the microphone for voice annotation and presenter audio."
    NSCameraUsageDescription: "PwrSnap uses the camera for presenter video recording."
    # Audio capture description (Fast Video Capture, issue #64).
    # macOS uses this when the user opts into system-audio recording.
    NSAudioCaptureUsageDescription: "PwrSnap records system audio for screen-recording exports when you turn it on."
  target:
    - target: dmg
      arch: [universal]
    - target: zip
      arch: [universal]

dmg:
  background: build/dmg-background.png
  window:
    width: 660
    height: 400
  iconSize: 112
  iconTextSize: 12
  contents:
    - x: 170
      y: 230
      type: file
    - x: 500
      y: 230
      type: link
      path: /Applications
  writeUpdateInfo: false

# Phase 1: github provider against the existing private pwrdrvr/PwrSnap repo.
publish:
  provider: github
  owner: pwrdrvr
  repo: PwrSnap
  private: true
  releaseType: release
