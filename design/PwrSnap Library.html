<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PwrSnap — Library</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="ds/colors_and_type.css" />
<link rel="stylesheet" href="src/floatover.css" />
<link rel="stylesheet" href="src/library.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  body { margin: 0; background: var(--bg-app); color: var(--text-primary); font-family: var(--font-sans); overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="src/design-canvas.jsx"></script>
<script type="text/babel" src="src/AppIcons.jsx"></script>
<script type="text/babel" src="src/Library.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { Library, PsAppTag, APP_INFO } = window.PS;

// ============================================================
// Notes panel
// ============================================================
function NotesPanel({ children, title }) {
  return (
    <div style={{
      width: "100%", height: "100%",
      padding: 36,
      background: "var(--bg-app)",
      borderRadius: 12,
      border: "1px solid var(--border-subtle)",
      fontFamily: "var(--font-sans)",
      color: "var(--text-secondary)",
      overflow: "auto",
    }}>
      <h2 style={{ font: "700 22px/1.15 var(--font-display)", color: "var(--text-primary)", margin: "0 0 6px", letterSpacing: "-0.01em" }}>{title}</h2>
      {children}
    </div>
  );
}

// ============================================================
// App-tag showcase — comparison + matrix
// ============================================================
function TagShowcase() {
  const apps = Object.entries(APP_INFO);
  return (
    <div style={{
      width: "100%", height: "100%", padding: 36,
      background: "var(--bg-app)",
      border: "1px solid var(--border-subtle)",
      borderRadius: 12,
      overflow: "auto",
      fontFamily: "var(--font-sans)",
    }}>
      <h2 style={{ font: "700 22px/1.15 var(--font-display)", color: "var(--text-primary)", margin: "0 0 6px", letterSpacing: "-0.01em" }}>App-source tags</h2>
      <p style={{ font: "400 13px/1.45 var(--font-sans)", color: "var(--text-secondary)", margin: "0 0 24px", maxWidth: 560 }}>
        A <b style={{color:"var(--text-primary)"}}>system tag</b> distinct from regular content tags.
        Auto-detected at capture time, immutable. Visual signal: square icon-tile on the left, mono name, no leading-dot, slight squarer corner radius. App icons are monochrome, tinted in the system accent — never a foreign brand color in the UI.
      </p>

      {/* Side-by-side */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, marginBottom: 32 }}>
        <div style={{ padding: 18, background: "var(--bg-panel)", borderRadius: 10, border: "1px solid var(--border-subtle)" }}>
          <div style={{ font: "600 9px/1 var(--font-sans)", letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: 12 }}>Regular tags</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            <span className="ps-tag">bug</span>
            <span className="ps-tag is-accent">auth</span>
            <span className="ps-tag is-info">research</span>
            <span className="ps-tag is-success">done</span>
            <span className="ps-tag is-warn">p1</span>
            <span className="ps-tag is-suggest">+ codex</span>
          </div>
          <div style={{ font: "500 10px/1.4 var(--font-mono)", color: "var(--text-muted)", marginTop: 12 }}>
            User-editable · pill · leading dot · removable
          </div>
        </div>
        <div style={{ padding: 18, background: "var(--bg-panel)", borderRadius: 10, border: "1px solid var(--accent-border)" }}>
          <div style={{ font: "600 9px/1 var(--font-sans)", letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--accent-bright)", marginBottom: 12 }}>App-source tag</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            <PsAppTag app="telegram" name="Telegram" />
            <PsAppTag app="excel" name="Excel" />
            <PsAppTag app="vscode" name="VS Code" />
            <PsAppTag app="figma" name="Figma" />
            <PsAppTag app="terminal" name="Terminal" />
          </div>
          <div style={{ font: "500 10px/1.4 var(--font-mono)", color: "var(--text-muted)", marginTop: 12 }}>
            System · square tile + name · immutable · always one per snap
          </div>
        </div>
      </div>

      {/* Sizes */}
      <div style={{ font: "600 9px/1 var(--font-sans)", letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: 10 }}>Sizes</div>
      <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 28 }}>
        <PsAppTag app="figma" name="Figma" size="sm" />
        <PsAppTag app="figma" name="Figma" size="md" />
        <PsAppTag app="figma" name="Figma" size="lg" />
        <span style={{ font: "500 10px/1.4 var(--font-mono)", color: "var(--text-muted)", marginLeft: 12 }}>sm 18 · md 22 · lg 26</span>
      </div>

      {/* Full grid */}
      <div style={{ font: "600 9px/1 var(--font-sans)", letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: 10 }}>Detected apps · {apps.length}</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
        {apps.map(([app, info]) => (
          <PsAppTag key={app} app={app} name={info.name} />
        ))}
      </div>

      {/* In context */}
      <div style={{ font: "600 9px/1 var(--font-sans)", letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--text-muted)", margin: "28px 0 10px" }}>In context · capture metadata row</div>
      <div style={{ padding: 14, background: "var(--bg-panel)", borderRadius: 8, border: "1px solid var(--border-subtle)" }}>
        <div style={{ font: "600 13px/1.3 var(--font-sans)", marginBottom: 8 }}>auth flow — token refresh</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 5, alignItems: "center" }}>
          <PsAppTag app="vscode" name="VS Code" />
          <span className="ps-tag">bug</span>
          <span className="ps-tag is-accent">auth</span>
          <span className="ps-tag is-warn">p1</span>
          <span className="ps-tag is-suggest">+ token-refresh</span>
        </div>
      </div>
    </div>
  );
}

function LibraryNotes() {
  return (
    <NotesPanel title="Library — three states, one model">
      <p style={{ font: "400 13px/1.5 var(--font-sans)", color: "var(--text-secondary)", margin: "0 0 12px" }}>
        Reworked from a mashed-together reel+grid into <b style={{color:"var(--text-primary)"}}>three discrete view-states</b> sharing the same selection + filter model. The Reel/Grid toggle now actually does something.
      </p>

      <div style={{ font: "600 9px/1 var(--font-sans)", letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--accent-bright)", margin: "14px 0 6px" }}>① Grid (default landing)</div>
      <ul style={{ font: "400 13px/1.55 var(--font-sans)", color: "var(--text-secondary)", paddingLeft: 18, margin: "0 0 10px" }}>
        <li>Day-grouped cells fill the entire main area — no shrunken sidebar preview competing.</li>
        <li>Click any cell → opens <b style={{color:"var(--text-primary)"}}>Focus overlay</b>; the cell briefly pulses on return.</li>
      </ul>

      <div style={{ font: "600 9px/1 var(--font-sans)", letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--accent-bright)", margin: "12px 0 6px" }}>② Focus overlay (single image · edit)</div>
      <ul style={{ font: "400 13px/1.55 var(--font-sans)", color: "var(--text-secondary)", paddingLeft: 18, margin: "0 0 10px" }}>
        <li>Big stage at usable size — solving the "sidebar image too small to edit" gripe.</li>
        <li><b style={{color:"var(--text-primary)"}}>Floating × top-right</b> + Esc dismiss back to scroll position.</li>
        <li><b style={{color:"var(--text-primary)"}}>Edit toolbar floats bottom-center of canvas</b> — Select / Crop / Arrow / Rect / Highlight / Text / Blur with single-letter hotkeys + color swatches + magic wand + undo. Ports the affordances we had hidden in the sidebar onto a surface big enough to actually use.</li>
        <li>← / → cycle through filtered set without leaving.</li>
        <li>Detail rail shows metadata, Codex caption, and the <b style={{color:"var(--text-primary)"}}>L/M/H copy row</b> from FloatOver — no more blind clipboard copy.</li>
      </ul>

      <div style={{ font: "600 9px/1 var(--font-sans)", letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--accent-bright)", margin: "12px 0 6px" }}>③ Reel mode</div>
      <ul style={{ font: "400 13px/1.55 var(--font-sans)", color: "var(--text-secondary)", paddingLeft: 18, margin: "0 0 10px" }}>
        <li>Filmstrip on top + always-open big stage below — you're always on one image, so no × needed.</li>
        <li>Exit via the segmented control. Selection preserved across modes.</li>
        <li>Same edit toolbar + L/M/H copy row — consistent muscle memory.</li>
      </ul>

      <div style={{ font: "600 9px/1 var(--font-sans)", letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--text-muted)", margin: "14px 0 6px" }}>State transitions</div>
      <pre style={{ font: "500 11px/1.5 var(--font-mono)", color: "var(--text-secondary)", background: "var(--bg-input)", padding: 10, borderRadius: 6, border: "1px solid var(--border-subtle)", margin: "0 0 12px", whiteSpace: "pre-wrap" }}>{`Grid ──click cell──▶ Focus overlay
Grid ──[Reel toggle]──▶ Reel
Focus ──[× / Esc]──▶ Grid (return to scroll)
Focus ──[Reel toggle]──▶ Reel (selection kept)
Reel ──[Grid toggle]──▶ Grid (selection kept)`}</pre>

      <p style={{ font: "400 12px/1.45 var(--font-mono)", color: "var(--text-muted)", margin: 0 }}>
        L/M/H mirrors FloatOver: ⌘1/⌘2/⌘3, scaled dimensions visible <i>before</i> copy, byte estimate, primary = High.
      </p>
    </NotesPanel>
  );
}

// ============================================================
// Main
// ============================================================
function App() {
  return (
    <DesignCanvas projectName="PwrSnap" deliverable="Library">

      <DCSection id="library-grid" title="① Library · Grid mode (default landing)">
        <DCArtboard id="library-grid-default" label="Grid · all captures · nothing open" width={1440} height={900}>
          <Library initialView="grid" initialSelected={5} initialOpen={false} />
        </DCArtboard>
        <DCArtboard id="library-notes" label="Design notes" width={500} height={900}>
          <LibraryNotes />
        </DCArtboard>
      </DCSection>

      <DCSection id="library-focus" title="② Focus overlay · single-image edit (from Grid)">
        <DCArtboard id="library-focus-open" label="Cell clicked · floating × · in-canvas edit toolbar · L/M/H copy" width={1440} height={900}>
          <Library initialView="grid" initialSelected={5} initialOpen={true} />
        </DCArtboard>
      </DCSection>

      <DCSection id="apptag" title="③ App-source tag · system provenance">
        <DCArtboard id="apptag-showcase" label="Anatomy · sizes · matrix" width={920} height={760}>
          <TagShowcase />
        </DCArtboard>
      </DCSection>

      <DCSection id="library-reel" title="④ Reel mode · always-open stage + filmstrip">
        <DCArtboard id="library-reel-default" label="Reel · no × needed · same edit toolbar + L/M/H" width={1440} height={900}>
          <Library initialView="reel" initialSelected={5} />
        </DCArtboard>
        <DCArtboard id="library-reel-vscode" label="Reel · filtered to VS Code" width={1440} height={900}>
          <Library initialView="reel" initialSelected={5} initialApp="vscode" />
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
