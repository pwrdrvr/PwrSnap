packages:
  - apps/*
  - packages/*
minimumReleaseAge: 10080
# Release builds produce a universal macOS app and an x64 Windows installer.
# Runtime packages like sharp publish OS+CPU-specific optional dependencies,
# so install both Darwin slices and the win32-x64 slice even when the release
# stage is prepared on a single-architecture / single-OS runner. `current`
# keeps the host's own slice (e.g. linux-x64 for the Linux unit/E2E jobs).
supportedArchitectures:
  os:
    - darwin
    - win32
    - current
  cpu:
    - x64
    - arm64
    - current
allowBuilds:
  better-sqlite3: true
  electron: true
  electron-winstaller: true
  esbuild: true
  sharp: true

# The @pwrdrvr/agent-kit packages are PwrDrvr's own, freshly published, and
# pinned — exempt them from the 7-day minimumReleaseAge gate (which targets
# untrusted third-party releases) so PwrSnap can consume 0.1.0 immediately.
minimumReleaseAgeExclude:
  - "@pwrdrvr/codex-app-server-protocol"
  - "@pwrdrvr/agent-core"
  - "@pwrdrvr/agent-transport"
  - "@pwrdrvr/codex-discovery"
  - "@pwrdrvr/agent-client"
  - "@pwrdrvr/agent-acp"
  - "@pwrdrvr/agent-chat-react"
