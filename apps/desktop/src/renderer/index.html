<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PwrSnap</title>
    <!-- Fonts are self-hosted via @fontsource. No runtime network calls
         on cold start, app works fully offline. See src/styles/fonts.css. -->
    <!--
      Pre-React appearance bootstrap.

      Runs synchronously before main.tsx loads, before React mounts,
      and before any stylesheet has applied a paint pass. Sets the
      `data-theme` attribute and `color-scheme` style on <html> so
      first paint matches the user's persisted theme — no flash-of-
      wrong-theme on a light-themed cold launch.

      Source of truth, in priority order:
        1. `window.__pwrsnapAppearance` — populated by the preload
           from Electron's `additionalArguments`, which main sets at
           window construction time after a synchronous read of the
           Settings JSON. Authoritative; available on the very first
           launch even before localStorage has been seeded.
        2. localStorage `pwrsnap.appearance.v1` — fallback for paths
           where the preload bridge isn't loaded (e.g. opening a
           file:// renderer in a tool that doesn't run our preload).
           The renderer hook mirrors every theme change here on the
           way out so this cache stays correct across launches.
        3. "system" default → matchMedia resolved at this exact
           instant.

      We set `style.colorScheme` on <html> in addition to the data-
      theme attribute. tokens.css declares `color-scheme: light` on
      `:root[data-theme="light"]`, but until the CSS loads, native
      form controls + scrollbars paint in the default (dark) color-
      scheme. Inline-styling the property closes that gap so even
      the first 50ms before CSS arrives renders correctly.

      try/catch swallows everything intentionally — if any step
      throws (localStorage disabled, JSON parse error, matchMedia
      missing, exotic Electron version), we leave <html> in its
      default (dark) state and the React hook reconciles on mount.
      Better a brief flash than a blank screen.
    -->
    <script>
      (function () {
        try {
          // Platform tag for platform-specific chrome CSS (e.g. the Windows
          // custom title bar drops the macOS stoplight reservation and reserves
          // space for the native caption buttons). `window.pwrsnapApi.platform`
          // is exposed by the preload, which runs before this inline script.
          var plat = window.pwrsnapApi && window.pwrsnapApi.platform;
          if (typeof plat === "string" && plat) {
            document.documentElement.setAttribute("data-platform", plat);
          }
        } catch (_platErr) {
          /* non-fatal — CSS just keeps the macOS defaults */
        }
        try {
          var theme = "system";
          var bridged = window.__pwrsnapAppearance;
          if (bridged && (bridged.theme === "system" || bridged.theme === "dark" || bridged.theme === "light")) {
            theme = bridged.theme;
          } else {
            var KEY = "pwrsnap.appearance.v1";
            var raw = window.localStorage.getItem(KEY);
            if (raw) {
              var parsed = JSON.parse(raw);
              if (parsed && (parsed.theme === "system" || parsed.theme === "dark" || parsed.theme === "light")) {
                theme = parsed.theme;
              }
            }
          }
          var resolved = theme;
          if (resolved === "system") {
            var mq = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)");
            resolved = mq && mq.matches ? "light" : "dark";
          }
          if (resolved === "light") {
            document.documentElement.setAttribute("data-theme", "light");
            document.documentElement.style.colorScheme = "light";
          } else {
            document.documentElement.removeAttribute("data-theme");
            document.documentElement.style.colorScheme = "dark";
          }
        } catch (_err) {
          /* fall through — React hook reconciles on mount */
        }
      })();
    </script>
    <!--
      Library boot skeleton (see the inline script after #root).

      Startup profiling (2026-06) showed the Library window's
      `ready-to-show` firing on the EMPTY html shell — Chromium paints
      the bare black page, main shows the window, and the user stares
      at a featureless void until React mounts, library:list returns,
      and the first thumbnails decode (~1.5s warm, several seconds on
      a cold launch). The skeleton makes that window paint the app
      shell's structure (topbar / sidebar / thumbnail grid ghosts)
      instead of nothing.

      Static markup injected into #root, so React's first render
      commit replaces it automatically — no teardown code, no flash
      management. Colors ride the design tokens when the stylesheet
      has loaded (packaged builds: <link> precedes first paint) and
      fall back to the literal dark/light palette values (dev mode:
      vite injects CSS at JS-eval time, after this paints). Gated to
      the library stage — every other window (tray, float-over,
      settings…) carries a `#stage=` hash and skips it.
    -->
    <style>
      .boot-skel {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-columns: 220px minmax(0, 1fr);
        grid-template-rows: 52px minmax(0, 1fr);
        background: var(--bg-app, #000000);
      }
      html[data-theme="light"] .boot-skel {
        background: var(--bg-app, #ffffff);
      }
      .boot-skel__topbar {
        grid-column: 1 / -1;
        background: var(--bg-sidebar, #050505);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .boot-skel__sidebar {
        background: var(--bg-sidebar, #050505);
        border-right: 1px solid rgba(255, 255, 255, 0.06);
      }
      html[data-theme="light"] .boot-skel__topbar,
      html[data-theme="light"] .boot-skel__sidebar {
        background: var(--bg-sidebar, #f7f4ef);
        border-color: rgba(0, 0, 0, 0.07);
      }
      .boot-skel__grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 14px;
        padding: 20px;
        align-content: start;
        overflow: hidden;
      }
      /* Tiles are deliberately STATIC — no pulse animation. An infinite
         opacity animation here runs from skeleton-inject until React's
         first commit clears it, and on GPU-less machines (CI runners,
         some VMs) Chromium composites in software — the animating
         library window starved the shared compositor enough that the
         TRAY renderer's ResizeObserver (rendering-step-aligned) never
         fired, killing its resize IPC and flaking the Windows tray
         popover specs (PR #238, four red rounds). A static skeleton
         costs the compositor nothing after its first frame. */
      .boot-skel__tile {
        aspect-ratio: 16 / 10;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.045);
      }
      html[data-theme="light"] .boot-skel__tile {
        background: rgba(0, 0, 0, 0.05);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        try {
          var hash = window.location.hash || "";
          var isLibrary = hash.indexOf("stage=") === -1 || hash.indexOf("stage=library") !== -1;
          if (!isLibrary) return;
          var tiles = "";
          for (var i = 0; i < 18; i++) tiles += '<div class="boot-skel__tile"></div>';
          document.getElementById("root").innerHTML =
            '<div class="boot-skel">' +
            '<div class="boot-skel__topbar"></div>' +
            '<div class="boot-skel__sidebar"></div>' +
            '<div class="boot-skel__grid">' + tiles + "</div>" +
            "</div>";
        } catch (_err) {
          /* non-fatal — worst case the window paints the bare background */
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
