name: CI

on:
  push:
    branches:
      - main
  pull_request:
    # Include windows-gui-port so the stacked Windows-port PRs (installer,
    # window-picker, …) that target it get CI, not just PRs to main.
    branches:
      - main
      - windows-gui-port
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  install-deps:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1
        with:
          node-version: "24.14.1"
          lookup-only: "true"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1
        with:
          node-version: "24.14.1"

      - name: Lint
        run: pnpm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1
        with:
          node-version: "24.14.1"

      - name: Build
        run: pnpm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1
        with:
          node-version: "24.14.1"

      - name: Test
        run: pnpm run test

  desktop-e2e:
    name: Desktop E2E
    runs-on: ubuntu-latest
    needs: install-deps
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1
        with:
          node-version: "24.14.1"

      - name: Run desktop Electron E2E specs
        # The macOS-only specs (screencapture-based) are gated via
        # `test.skip(!isMac)` and don't fail the suite on Linux.
        #
        # No `playwright install-deps` step: `ubuntu-latest` ships
        # Chrome + Firefox preinstalled, which drag in the GTK +
        # libnss / libgbm / libasound stack Electron needs under
        # xvfb. PwrAgnt's CI has been running Electron E2E this way
        # for months without issue, and the apt-install step it
        # replaces routinely takes 2–5 minutes on cold mirrors. If a
        # specific library turns out to be missing in some future
        # ubuntu-latest revision, add a targeted `apt-get install -y
        # libfoo` (~15s) instead of bringing back the full
        # `playwright install-deps` blast.
        run: xvfb-run --auto-servernum pnpm run test:desktop-e2e

      - name: Upload desktop Playwright artifacts
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: desktop-e2e-artifacts
          path: |
            apps/desktop/playwright-report/
            apps/desktop/test-results/
          retention-days: 30

  windows:
    name: Windows (lint + build + test)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # The shared pwrdrvr/configure-nodejs action is bash/Linux-oriented
      # (find/grep cache logic), so use the portable pnpm + setup-node combo
      # here to keep the Windows job self-contained. Scope is the unit suite +
      # build + lint — the Electron GUI E2E (screen capture, tray, AppKit
      # windowing) is macOS-specific and not yet ported to Windows.
      - name: Install pnpm
        # Version comes from package.json's `packageManager` field (omit
        # `version` here) so there's no second pnpm pin to drift on upgrade.
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

  windows-e2e:
    name: Windows Desktop E2E
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
          cache: pnpm

      # Diagnostics only — never deletes anything. Reports free space +
      # the size of preinstalled trees we could clear before the E2E job,
      # so we can size a future cleanup step from real numbers. Runs
      # twice (before install, before E2E) to show install/build impact.
      - name: Disk diagnostics (before install)
        shell: pwsh
        continue-on-error: true
        run: pwsh -File scripts/ci/windows-disk-report.ps1 -Label "before install"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Disk diagnostics (before E2E)
        shell: pwsh
        continue-on-error: true
        run: pwsh -File scripts/ci/windows-disk-report.ps1 -Label "before E2E"

      - name: Run desktop Electron E2E specs (Windows)
        # windows-latest provides an interactive desktop session, so (unlike the
        # Linux job) no xvfb is needed. macOS-only specs self-skip via
        # `test.skip(!isMac)`; this verifies the cross-platform specs and, as the
        # GUI surfaces get ported, the newly un-skipped Windows specs.
        run: pnpm run test:desktop-e2e

      - name: Upload desktop Playwright artifacts
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: windows-desktop-e2e-artifacts
          path: |
            apps/desktop/playwright-report/
            apps/desktop/test-results/
          retention-days: 30
