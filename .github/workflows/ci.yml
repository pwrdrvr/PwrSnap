name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  install-deps:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1
        with:
          lookup-only: "true"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1

      - name: Lint
        run: pnpm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1

      - name: Build
        run: pnpm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1

      - name: Test
        run: pnpm run test

  desktop-e2e:
    name: Desktop E2E
    runs-on: ubuntu-latest
    needs: install-deps
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1

      - name: Install Electron OS deps
        # Electron under xvfb on a fresh Ubuntu runner needs the GTK +
        # libnss / libgbm / libasound stack. `playwright install-deps`
        # is the cheapest way to land all of them in one step.
        run: pnpm --filter @pwrsnap/desktop exec playwright install-deps

      - name: Run desktop Electron E2E specs
        # The macOS-only specs (screencapture-based) are gated via
        # `test.skip(!isMac)` and don't fail the suite on Linux.
        run: xvfb-run --auto-servernum pnpm run test:desktop-e2e

      - name: Upload desktop Playwright artifacts
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: desktop-e2e-artifacts
          path: |
            apps/desktop/playwright-report/
            apps/desktop/test-results/
          retention-days: 30
