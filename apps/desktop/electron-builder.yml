appId: com.pwrdrvr.pwrsnap
productName: PwrSnap
copyright: "Copyright © 2026 PwrDrvr LLC. All rights reserved."

# Sign nested .appex Quick Look extensions BEFORE electron-builder
# signs the parent app's main binary. electron-builder's
# auto-walker doesn't auto-discover .appex bundles in
# Contents/PlugIns/ for signing, so the parent codesign pass would
# otherwise abort with "code object is not signed at all / In
# subcomponent: PlugIns/PwrSnapThumbnailExtension.appex". The hook
# uses the same Developer ID identity electron-builder discovers for
# the parent + a minimal entitlements file (no V8 / libvips
# exemptions, this is a sandboxed Quick Look provider).
afterPack: "scripts/afterpack-sign-appex.mjs"

electronVersion: 41.2.1

asar: true
asarUnpack:
  - "**/*.node"
  # Sharp's libvips runtime ships as `libvips-cpp.<ver>.dylib`
  # inside `@img/sharp-libvips-darwin-<arch>/lib/`. The `**/*.node`
  # rule above only catches sharp's tiny thin binding
  # (`@img/sharp-darwin-<arch>/lib/sharp-darwin-<arch>.node`); the
  # libvips `.dylib` it dlopens by dyld @rpath has to live on a
  # real filesystem path, not inside an asar archive. Unpacking the
  # whole `@img/**` tree keeps both the thin binding and the libvips
  # dylib resolvable. Beta.3 shipped without this rule (and without
  # the @img sub-packages — see release.mjs step 5b); the app
  # crashed on startup with "Could not load the sharp module using
  # the darwin-arm64 runtime".
  - "**/node_modules/@img/**"
compression: normal

# Files included in the .app bundle. Run via apps/desktop/scripts/release.mjs
# which first runs `pnpm deploy` to materialize a flat node_modules tree, since
# pnpm's symlinked virtual store interacts poorly with electron-builder's
# default node_modules walk.
files:
  - "out/**/*"
  - "package.json"
  # Compiled JS only — drop sources, declarations, and sourcemaps.
  - "!**/*.map"
  - "!**/*.ts"
  - "!**/*.tsx"
  - "!**/*.d.ts"
  - "!**/tsconfig*.json"
  # Tests of any flavor.
  - "!**/*.test.*"
  - "!**/*.spec.*"
  - "!**/__tests__/**"
  - "!**/__mocks__/**"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/e2e/**"
  - "!**/playwright.config.*"
  # Markdown / docs from third-party packages and our own workspace packages.
  # The app-owned prompt exception above is intentional.
  - "!**/*.md"
  - "!**/*.mdx"
  - "!**/docs/**"
  # Misc dotfiles and examples that occasionally ship inside dependency tarballs.
  - "!**/.env*"
  - "!**/.npmignore"
  - "!**/.editorconfig"
  - "!**/.eslintrc*"
  - "!**/.prettierrc*"
  - "!**/.github/**"
  - "!**/node_modules/@zed-industries/agent-client-protocol/typescript/examples/**"
  # Our own workspace package metadata is unused at runtime — vite inlines.
  - "!**/node_modules/@pwrsnap/*/AGENTS.md"
  - "!**/node_modules/@pwrsnap/*/src/**"
  # better-sqlite3 ships a native test extension that is not loaded at
  # runtime. If included, @electron/universal sees identical test binaries in
  # both temp app trees and aborts the universal merge.
  - "!**/node_modules/better-sqlite3/build/Release/test_extension.node"
  # App-owned prompt assets are intentionally readable Markdown in app.asar.
  - "out/main/prompts/**/*.md"

# Cross-platform resources shipped under Contents/Resources/ (macOS)
# or resources/ (Windows). Resolved at runtime via
# `process.resourcesPath`. Platform-only payloads (the macOS Swift
# helpers + ffmpeg + Quick Look extensions) live under `mac:` below so
# a Windows build doesn't try to copy files that build-native.mjs
# never produces off-darwin.
extraResources:
  - from: "THIRD_PARTY_LICENSES"
    to: "THIRD_PARTY_LICENSES"
  - from: "CHANGELOG.md"
    to: "CHANGELOG.md"
  # Tray icons. macOS reads the alpha-only *template* PNG (system tints
  # it for dark/light/accent menubars); Windows/Linux read the colored
  # `tray-icon.png`. Electron's nativeImage auto-loads the @Nx siblings
  # when given the base path, so each base PNG needs its @2x/@3x next to
  # it under resourcesPath. resolveTrayIconPath() in main/tray.ts picks
  # the right base per platform. Both sets are tiny (<2 KB total) and
  # exist in the repo on every platform, so they ship everywhere rather
  # than fiddling with per-platform tray-icon resource lists.
  - from: "build/tray-icon-template.png"
    to: "tray-icon-template.png"
  - from: "build/tray-icon-template@2x.png"
    to: "tray-icon-template@2x.png"
  - from: "build/tray-icon-template@3x.png"
    to: "tray-icon-template@3x.png"
  - from: "build/tray-icon.png"
    to: "tray-icon.png"
  - from: "build/tray-icon@2x.png"
    to: "tray-icon@2x.png"
  - from: "build/tray-icon@3x.png"
    to: "tray-icon@3x.png"

electronFuses:
  runAsNode: false
  enableCookieEncryption: true
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true
  loadBrowserProcessSpecificV8Snapshot: false
  grantFileProtocolExtraPrivileges: true

mac:
  category: public.app-category.graphics-design
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # macOS-only native helpers (Swift CLIs that wrap macOS system APIs)
  # + the LGPL ffmpeg binary. Compiled by scripts/build-native.mjs /
  # build-ffmpeg.mjs into build/native/ and build/ffmpeg/; these paths
  # only exist on a darwin build (build-native.mjs is a no-op
  # off-darwin), so they live under `mac:` to keep Windows packaging
  # from trying to copy files that were never produced. Shipped under
  # Contents/Resources/ with PwrSnap-prefixed names so
  # `process.resourcesPath` lookups in main are unambiguous.
  extraResources:
    - from: "build/native/window-list"
      to: "PwrSnapWindowList"
    # Fast Video Capture helper (issue #64). ScreenCaptureKit-based
    # fixed-rect recorder spoken to via stdin/stdout JSON-RPC by
    # apps/desktop/src/main/recording/recording-service.ts.
    - from: "build/native/recorder"
      to: "PwrSnapRecorder"
    # Named image pasteboard helper. Writes PNG/TIFF bytes and a
    # friendly public.file-url in one NSPasteboard item so Slack/Mail
    # can show a PwrSnap filename while raw image paste still works.
    - from: "build/native/pasteboard-writer"
      to: "PwrSnapPasteboardWriter"
    # FFmpeg built from upstream source by scripts/build-ffmpeg.mjs
    # with no GPL or nonfree configure flags. Spawned by GIF/MP4
    # export, video poster extraction, enrichment frames, and sizzle
    # reel composition. It must be an actual filesystem executable,
    # not an app.asar entry.
    - from: "build/ffmpeg/ffmpeg"
      to: "PwrSnapFFmpeg"
    # Diagnostic CLI for the Quick Look Thumbnail Extension. Ships
    # alongside production so we can reproduce a thumbnail-rendering
    # failure on a user machine without rebuilding from source.
    # Standalone Mach-O at Contents/Resources/PwrSnapThumbnailCli.
    - from: "build/native/pwrsnap-thumbnail-cli"
      to: "PwrSnapThumbnailCli"
  # macOS Quick Look Thumbnail + Preview Extensions. Live under
  # PwrSnap.app/Contents/PlugIns/ (note the capitalized P-L-U-G-I-N-S —
  # the macOS convention is distinct from generic "plugins"). Launch
  # Services auto-discovers the extensions when the parent app is
  # registered, then macOS routes any thumbnail / preview request for
  # `com.pwrdrvr.pwrsnap.bundle`-typed files through them.
  #
  # Each `.appex` is a directory; electron-builder copies the whole
  # tree. Built by scripts/build-native.mjs which compiles the Swift
  # loadable-bundle, drops in Info.plist, and ad-hoc signs the package.
  # Production builds get re-signed with the Developer ID at
  # notarization time (afterPack hook iterates every `.appex` under
  # PlugIns/). The Thumbnail and Preview extensions are separate
  # extension points with separate principal classes and bundle ids, so
  # a registration failure for one doesn't take the sibling down.
  extraFiles:
    - from: "build/native/PwrSnapThumbnailExtension.appex"
      to: "PlugIns/PwrSnapThumbnailExtension.appex"
    - from: "build/native/PwrSnapPreviewExtension.appex"
      to: "PlugIns/PwrSnapPreviewExtension.appex"
  # These files are intentionally identical in both temp app trees before
  # @electron/universal merges them. The Swift helper is prebuilt universal;
  # Sharp and ffmpeg optional dependency directories are arch-named and each
  # final app needs both Darwin CPU payloads available at runtime.
  x64ArchFiles: "Contents/Resources/{PwrSnapWindowList,PwrSnapPasteboardWriter,PwrSnapFFmpeg,app.asar.unpacked/node_modules/@img/{sharp-darwin-*,sharp-libvips-darwin-*}/**/*}"
  helperBundleId: com.pwrdrvr.pwrsnap.helper
  helperRendererBundleId: com.pwrdrvr.pwrsnap.helper.Renderer
  helperGPUBundleId: com.pwrdrvr.pwrsnap.helper.GPU
  helperPluginBundleId: com.pwrdrvr.pwrsnap.helper.Plugin
  extendInfo:
    NSHumanReadableCopyright: "Copyright © 2026 PwrDrvr LLC. All rights reserved."
    LSMinimumSystemVersion: "14.0"
    LSApplicationCategoryType: public.app-category.graphics-design
    NSScreenCaptureUsageDescription: "PwrSnap captures your screen for screenshots and screen recording."
    NSMicrophoneUsageDescription: "PwrSnap uses the microphone for voice annotation and presenter audio."
    NSCameraUsageDescription: "PwrSnap uses the camera for presenter video recording."
    # Audio capture description (Fast Video Capture, issue #64).
    # macOS uses this when the user opts into system-audio recording.
    NSAudioCaptureUsageDescription: "PwrSnap records system audio for screen-recording exports when you turn it on."
    NSDocumentsFolderUsageDescription: "PwrSnap creates a 'PwrSnap' folder in your Documents and saves your screenshots and recordings there — so you can find them in Finder and sync them via iCloud. It only reads and writes its own folder."
    # Private UTI carrying PwrSnap layer-fragment payloads on the macOS
    # pasteboard. Pasting between two PwrSnap instances preserves layer
    # transforms, effects, and masks losslessly; non-PwrSnap consumers
    # read the `public.png` / `public.tiff` co-written in the same
    # pasteboard write (those are system UTIs — no declaration needed
    # here). The single multi-type write happens in the native helper
    # (apps/desktop/src/main/native-clipboard.ts → window-list's
    # `--write-clipboard`), since Electron can't co-write a custom UTI
    # and an image atomically. Receiving paste handler enforces five
    # defense layers (size cap, count cap, zod, sha256 verify, sharp
    # decode-probe) — see packages/shared/src/clipboard-layer-fragment.ts.
    UTExportedTypeDeclarations:
      - UTTypeIdentifier: com.pwrdrvr.pwrsnap.layer-fragment
        UTTypeDescription: "PwrSnap Layer Fragment"
        UTTypeConformsTo:
          - public.data
        UTTypeTagSpecification:
          public.mime-type:
            - application/vnd.pwrdrvr.pwrsnap.layer-fragment+json
      # `.pwrsnap` bundle file type. Declares the on-disk file format
      # that PwrSnap writes to ~/Documents/PwrSnap/ — a ZIP container
      # holding manifest.json, overlays.json, source.png, and an
      # optional composite_thumbnail.jpg. Declaring this UTI does two
      # things macOS-wide:
      #
      #   1. Quick Look's Thumbnail Extension (shipped in
      #      Contents/PlugIns/PwrSnapThumbnailExtension.appex above)
      #      hooks itself to this UTI via QLSupportedContentTypes, so
      #      Finder + the QuickLook API request thumbnails for
      #      `.pwrsnap` files through OUR provider instead of the
      #      generic Document icon.
      #
      #   2. CFBundleDocumentTypes below registers PwrSnap as the
      #      default opener — double-clicking a `.pwrsnap` in Finder
      #      launches PwrSnap with the file path.
      #
      # `public.composite-content` is the parent UT for "file that
      # contains multiple media types" — PDFs, RTF documents,
      # etc. — which is conceptually what a `.pwrsnap` is (PNG +
      # JSON metadata). Conforming to it surfaces our type in the
      # "All Documents" Finder query, helps Spotlight categorize it,
      # and gives Preview.app / future Quick Look Preview Extension
      # a sane fallback.
      - UTTypeIdentifier: com.pwrdrvr.pwrsnap.bundle
        UTTypeDescription: "PwrSnap Capture Bundle"
        UTTypeConformsTo:
          - public.data
          - public.composite-content
        UTTypeIconFile: icon.icns
        UTTypeTagSpecification:
          public.filename-extension:
            - pwrsnap
          public.mime-type:
            - application/vnd.pwrdrvr.pwrsnap.bundle+zip
    # Register PwrSnap as the default handler for `.pwrsnap` files.
    # Double-clicking one in Finder launches the app with the file
    # path; macOS's "Open With…" menu lists PwrSnap as the primary
    # choice. The CFBundleTypeRole=Editor signals PwrSnap is the
    # native authoring environment for these files (not just a
    # viewer), which puts us at the top of the Open With list and
    # lets us claim the file type during install.
    CFBundleDocumentTypes:
      - CFBundleTypeName: "PwrSnap Capture Bundle"
        CFBundleTypeRole: Editor
        CFBundleTypeIconFile: icon.icns
        LSHandlerRank: Owner
        LSItemContentTypes:
          - com.pwrdrvr.pwrsnap.bundle
  target:
    - target: dmg
      arch: [universal]
    - target: zip
      arch: [universal]

dmg:
  background: build/dmg-background.png
  window:
    width: 660
    height: 400
  iconSize: 112
  iconTextSize: 12
  contents:
    - x: 170
      y: 230
      type: file
    - x: 500
      y: 230
      type: link
      path: /Applications
  writeUpdateInfo: false

# Windows (Phase 8 cross-platform port). x64 NSIS installer. The .ico is
# derived by electron-builder from the 512+px build/icon.png (1024×1024 in
# the repo) — no hand-authored .ico needed. Native modules: better-sqlite3
# ships its Electron-native win32-x64 sidecar via rebuild-native-for-electron
# (run with npm_config_arch=x64 before packaging), and sharp's win32-x64
# optional dependency is pulled in by pnpm-workspace.yaml's
# supportedArchitectures. asarUnpack `**/*.node` above keeps both binaries on
# a real filesystem path.
win:
  icon: build/icon.png
  requestedExecutionLevel: asInvoker
  signAndEditExecutable: true
  verifyUpdateCodeSignature: true
  # Register `.pwrsnap` with Explorer / Open With for the NSIS install.
  # macOS keeps its richer UTI declaration under `mac.extendInfo` above.
  fileAssociations:
    - ext: pwrsnap
      name: "PwrSnap Capture Bundle"
      description: "PwrSnap Capture Bundle"
      role: Editor
      icon: build/icon.png
      mimeType: application/vnd.pwrdrvr.pwrsnap.bundle+zip
  # No win.artifactName: the only target is nsis, whose own artifactName
  # (below) is what names the installer. A win-level name here would be dead
  # config — electron-builder uses the per-target name for the nsis output.
  target:
    - target: nsis
      arch: [x64]
  # window-list C++ helper (native/window-list-win/main.cpp → built by
  # scripts/build-native.mjs into build/native/window-list.exe). Same role as
  # PwrSnapWindowList on macOS: drives snap-to-window in the region selector +
  # source-app metadata. Resolved at runtime via process.resourcesPath as
  # PwrSnapWindowList.exe in src/main/capture/window-list.ts.
  extraResources:
    - from: "build/native/window-list.exe"
      to: "PwrSnapWindowList.exe"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: PwrSnap
  artifactName: "${productName}-${version}-windows-${arch}-setup.${ext}"

# Phase 1: github provider against the existing private pwrdrvr/PwrSnap repo.
publish:
  provider: github
  owner: pwrdrvr
  repo: PwrSnap
  private: true
  # Every CI-published build is born as a GitHub Pre-release. Promotion to
  # Latest is a separate operator action after the release is validated.
  releaseType: prerelease
