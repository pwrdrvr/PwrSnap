packages:
  - apps/*
  - packages/*
minimumReleaseAge: 10080
# Release builds produce a universal macOS app. Runtime packages like sharp
# publish CPU-specific optional dependencies, so install both Darwin slices
# even when the release stage is prepared on a single-architecture runner.
supportedArchitectures:
  os:
    - darwin
    - current
  cpu:
    - x64
    - arm64
    - current
allowBuilds:
  better-sqlite3: true
  electron: true
  electron-winstaller: true
  esbuild: true
  sharp: true

# The @pwrdrvr/agent-kit packages are PwrDrvr's own, freshly published, and
# pinned — exempt them from the 7-day minimumReleaseAge gate (which targets
# untrusted third-party releases) so PwrSnap can consume 0.1.0 immediately.
minimumReleaseAgeExclude:
  - "@pwrdrvr/codex-app-server-protocol"
  - "@pwrdrvr/agent-core"
  - "@pwrdrvr/agent-transport"
  - "@pwrdrvr/codex-discovery"
  - "@pwrdrvr/agent-client"
  - "@pwrdrvr/agent-acp"
  - "@pwrdrvr/agent-chat-react"
